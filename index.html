<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwind & daisyui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- fab icon  -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <title>English window || More resources for learning English</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="shadow-sm">
        <div class="navbar bg-base-100  max-w-[1200px] w-11/12 mx-auto">
            <div class="flex-1">
                <a class="flex items-center gap-1 md:gap-2 text-xl">
                    <span class="text-xs md:text-base font-bold">English</span>
                    <img class="w-5 h-5 md:w-10 md:h-10" src="./assets/logo.png" alt="">
                    <span class="text-xs md:text-base font-bn font-semibold">জানালা</span>
                </a>
            </div>
            <div class="flex-none">
                <ul class="menu menu-horizontal px-1 gap-x-2">
                    <li><button class="btn btn-xs md:btn-sm btn-outline text-[9px] md:text-base btn-primary"><i
                                class="fa-solid fa-circle-question"></i> FAQ</button></li>
                    <li><button class="btn btn-xs md:btn-sm btn-outline text-[9px] md:text-base btn-primary"><i
                                class="fa-brands fa-leanpub"></i> Learn</button></li>
                    <li><button class="btn btn-xs md:btn-sm btn-outline text-[9px] md:text-base btn-primary"><i
                                class="fa-solid fa-arrow-right-from-bracket"></i> LogOut</button></li>

                </ul>
            </div>
        </div>
    </header>

    <section class="flex flex-col-reverse md:flex-row items-center justify-center max-w-[1200px] w-11/12 mx-auto">
        <div class="left-part flex-1 space-y-8">
            <h1 class="text-3xl font-bold"><span class="text-blue-400">English</span> is Easy!!</h1>
            <p>আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা <br> আপনার দক্ষতা বাড়াতে চান, আমাদের
                Interactive Lessons আপনাকে নিয়ে <br> যাবে অন্য একটি Level এ</p>
            <div class="space-y-5">
                <input type="text" placeholder="Enter your name" class="input" />
                <input type="text" placeholder="********" class="input" />
                <div class="">
                    <button class="btn btn-soft btn-primary">Get Started</button>
                </div>
            </div>
        </div>
        <div class="right-part flex-1">
            <img src="./assets/hero-student.png" alt="">
        </div>
    </section>
    <!-- Vocabularies section  -->
    <section class="Vocabularies max-w-[1200px] w-11/12 mx-auto my-20">
        <h1 class="text-3xl text-center font-bold"><span class="text-blue-400">Let's</span> Learn Vocabularies</h1>
        <div id="lessons" class="flex items-center justify-center gap-5 flex-wrap mt-5">
            <!-- //lesson button design only -->

        </div>
    </section>
    <section id="currentData"
        class="max-w-[1200px] w-11/12 mx-auto my-20 bg-gray-100 p-3 md:p-5  grid grid-cols-1 md:grid-cols-3 gap-3 md:gap-5 rounded-2xl shadow-sm">
        <div class="font-bangla w-6/12 mx-auto col-span-3 rounded-2xl p-5 text-center">

            <!-- Word -->
            <p class="mb-2">আপনি এখনো কোন Lesson Select করেন নি</p>


            <!-- Meaning -->
            <p class="text-3xl text-gray-700 font-medium">
                একটি Lesson Select করুন।
            </p>
        </div>
    </section>

    <script src="./func/app.js"></script>
</body>

</html>
