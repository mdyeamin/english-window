<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- tailwind & daisyui cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- font awesome  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- fab icon  -->
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <title>English window || More resources for learning English</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="shadow-sm">
        <div class="navbar bg-base-100  max-w-[1200px] w-11/12 mx-auto">
            <div class="flex-1">
                <a class="flex items-center gap-1 md:gap-2 text-xl">
                    <span class="text-xs md:text-base font-bold">English</span>
                    <img class="w-5 h-5 md:w-10 md:h-10" src="./assets/logo.png" alt="">
                    <span class="text-xs md:text-base font-bn font-semibold">জানালা</span>
                </a>
            </div>
            <div class="flex-none">
                <ul class="menu menu-horizontal px-1 gap-x-2">
                    <li ><button class="btn btn-xs md:btn-sm btn-outline text-[9px] md:text-base btn-primary"><i class="fa-solid fa-circle-question"></i> FAQ</button></li>
                    <li ><button class="btn btn-xs md:btn-sm btn-outline text-[9px] md:text-base btn-primary"><i class="fa-brands fa-leanpub"></i> Learn</button></li>
                    <li ><button class="btn btn-xs md:btn-sm btn-outline text-[9px] md:text-base btn-primary"><i class="fa-solid fa-arrow-right-from-bracket"></i> LogOut</button></li>
                    
                </ul>
            </div>
        </div>
    </header>
</body>

</html>
